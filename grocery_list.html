<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grocery List :</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- NAV -->
<div class="card">
  <a id="homepage-redirect-link" class="gold-btn" href="index.html">🏠 Back</a>
  <div class="nav-divider"></div>
</div>

<!-- GROCERY LIST -->
<div class="card" style="height: 500px">

  <h3>📋 Grocery List :</h3>

  <div class="card flex-row">
    <p id="toggle-lock-message">Use the padlock to lock your selections.</p>
    <div class="orange-btn" onclick="toggleLock()" id="lockBtn">🔓 Lock</div>
  </div>

  <h4>Add Items :</h4>

  <div id="grocery-list" class="card overflow-y notepad-list" style="height: 400px;"></div>

  <hr>

<!-- TEXT AND VOICE INPUT NAV ROW -->
  <div class="blue-block flex-row">
    <div class="orange-btn" onclick="startVoice()">🎤</div>
    <input class="text-input" type="text" id="textInput" placeholder="Add items here...">
    <div class="orange-btn" onclick="addFromInput()">＋</div>
  </div>
<!-- END TEXT AND VOICE INPUT NAV ROW -->

</div>
<!-- END GROCERY LIST -->

<!-- =========================
     GROCERY MENU TOGGLE SYSTEM
     ========================= -->

<div class="card" id="grocery-menu">

    <h3>◆ 🛒 Grocery Menu :</h3>

    <div class="orange-btn"
         id="grocery-menu-toggle-button"
         onclick="toggleGroceryMenu()">
      ◆ - Open Menu - ◆ 

    </div>

    <div id="grocery-menu-list" class="toggle-menu-list hidden"></div>

</div>

<!-- END GROCERY MENU TOGGLE SYSTEM -->

<!-- SHARE -->
<div class="card">
  <div class="blue-block">◆ Share This App ◆</div>
  <div class="tip-box">
    <p>Enjoying the app? Share it with friends and family so they can try it too.</p>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service_worker.js');
}
</script>

<script type="module" src="grocery_list_data.js"></script>
<script type="module" src="firebase_login_auth.js"></script>
<script src="//cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
  
</body>
</html>
