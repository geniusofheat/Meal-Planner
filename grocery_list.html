<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Notepad</title>

  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Playfair+Display:wght@400;600&family=Space+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="grocery_list.css">
</head>

<body>

<header>
  <div class="header-left">
    <button onclick="handleBack()">← Back</button>
  </div>

  <div class="header-right">
    <div class="notepad-date" id="dateDisplay"></div>
  </div>
</header>

<main class="main">

  <div class="notepad-title-row">
    <div class="notepad-title">Grocery List</div>    <button class="hdr-btn" id="lockBtn" onclick="toggleLock()">🔓 Lock</button>
  </div>

  <div id="saveListContainer" class="save-name-row" style="display:none;">
    <input id="saveListNameInput" placeholder="Name this list..." />
    <button class="hdr-btn" onclick="confirmSaveList()">✓</button>
  </div>



  <div class="notepad-body">
    <div id="grocery-list"></div>
      <!-- BUTTONS ONLY ROW -->
  <div class="toolbar-row">

    <button class="hdr-btn" onclick="toggleSavedLists()">📋</button>


    <button class="hdr-btn-label" onclick="saveCurrentList()">Save</button>

  </div>

  </div>

  <!-- INPUT IS COMPLETELY SEPARATE -->
  <div class=".input-nav-row">
    <input class="text-input" id="textInput" placeholder="Add item..." />
    <button class="hdr-btn" onclick="addItems()">＋</button>
    <button class="hdr-btn" onclick="voiceInput()">🎤</button>  
  </div>


</main>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service_worker.js');
}
</script>

<script type="module" src="grocery_list_data.js"></script>
<script type="module" src="firebase_login_auth.js"></script>

<script src="//cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

</body>
</html>
