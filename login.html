<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meal Planner — Sign In/Out :</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;900&family=Crimson+Pro:ital,wght@0,400;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="blue_card_style.css">
</head>

<body>

<nav id="auth-nav" class="nav-card">
  <div id="nav-user-email" class="nav-welcome-message">Welcome, Guest :</div>
</nav>

<!-- ── NAV CONTAINER── -->
<div id="app">

  <!-- ── SIGN-IN CARD ── -->
<div class="card">
  	
<div class="card-header">
    	
    <h2 class="playfair">Sign In/Out :</h2>
      
<div class="divider"></div>
     
</div>
<div class="card-body">
    <p>Already have an account? Enter your email and password to sign in:</p>
    <input type="email" id="auth_email" placeholder="Email" class="input">
    <input class="input" type="password" id="auth_password" placeholder="Password">
    <button id="email-sign-in-btn" class="btn-blue">Sign In</button>
</div>
</div><!-- ── SIGN-IN CARD END ── -->

<!-- ── CREATE ACCOUNT CARD  ── -->
<div class="card">

<div class="card-header">
          <h2 class="playfair">Create Account :</h2>
      <hr>
      
    </div>
    <div class="card-body">
      <p>
        New here? Enter your username, email, and password below to create an account.
      </p>
      <input type="text" id="create_username" placeholder="Username" class="input">
      <input type="email" class="input" id="create_email" placeholder="Email">
      <input type="password" class="input" id="create_password" placeholder="Password">
      <button id="email-create-btn" class="btn-blue">Create Account</button>
      <p id="auth_error"></p>
    </div>
  </div>
  <!-- ── CREATE ACCOUNT CARD END ── -->

  <!-- ── PASSWORD RECOVERY CARD START ── -->
  <div class="card">
    <div class="card-header">
          <h2 class="playfair">Recover Password :</h2>
      <hr>
    </div>
    <div class="card-body">
      <p>
        Forgot your password? Enter your email below to recover it:
      </p>
      <input type="email" id="recover_email" placeholder="Email" class="input">
      <button id="password-recover-btn" class="btn-blue">Send Recovery Email</button>
    </div>
  </div>
  <!-- ── PASSWORD RECOVERY CARD END ── -->

<!-- ── BEGIN CONTACT FORM CARD ── -->
<div class="card">
<div class="card-header">
    <h2 class="playfair">Contact Us</h2>
    
    <hr>
    
</div>
  
<div class="card-body">
    <input type="text" id="contact_title" placeholder="Title" class="input">
    <input type="text" id="contact_username" placeholder="Username" class="input">
    <input type="email" id="contact_email" placeholder="Email" class="input">
    <textarea id="contact_message" placeholder="Message" style="padding:10px;border-radius:6px;border:1px solid #c8a96e;background:#0f1a33;color:#fff;resize:none;height:100px;"></textarea>
    
    <button id="contact_submit_btn" class="btn-blue">Send Message</button>
  </div>
</div>
<!-- ── END CONTACT FORM CARD ── -->


</div>
<!-- ── APP CONTAINER END ── -->

<script type="module" src="cookbook_auth.js"></script>

</body>
</html>
